{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow border-0 rounded-4 overflow-hidden">
<div class="bg-primary p-5 text-center text-white position-relative">
<div class="position-absolute start-50 translate-middle-x" style="bottom: -40px;">
<div class="bg-white rounded-circle p-2 shadow" style="width: 90px; height: 90px; display: inline-block;">
<div class="bg-light rounded-circle w-100 h-100 d-flex align-items-center justify-content-center">
    <span class="fs-1"></span>
</div>
</div>
</div>
</div>

<div class="card-body pt-5 text-center mt-3">
<h2 class="card-title fw-bold mb-1">{{ user.username }}</h2>
<p class="text-muted mb-4">{{ user.email }}</p>

<div class="mb-4">
{% if user.is_admin %}
<span class="badge bg-danger px-3 py-2 rounded-pill fs-6">Admin</span>
{% else %}
<span class="badge bg-success px-3 py-2 rounded-pill fs-6">User</span>
{% endif %}
</div>

<hr class="my-4">

<div class="d-grid gap-2">
{% if user.is_admin %}
<a href="/add_movie" class="btn btn-outline-danger btn-lg rounded-pill fs-6">add new movie</a>
{% endif %}
<a href="/movies" class="btn btn-primary btn-lg rounded-pill fs-6">see all the movies</a>
<a href="/logout" class="btn btn-light btn-lg text-danger rounded-pill fs-6 mt-2 border">log out</a>
</div>
</div>
</div>
</div>
</div>
</div>
{% endblock %}
